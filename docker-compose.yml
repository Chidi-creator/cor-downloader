services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cor
      POSTGRES_PASSWORD: cor
      POSTGRES_DB: cor
    ports:
      - "5433:5432"  # remove this line in production (keeps postgres internal)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"  # remove this line in production (keeps redis internal)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://cor:cor@postgres:5432/cor
      REDIS_ADDR: redis:6379
      QUEUE_KEY: cor:jobs
      HTTP_ADDR: :8080
      WORKER_CONCURRENCY: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  pgdata:
  minio_data:
